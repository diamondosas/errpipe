name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: errpipe-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: errpipe-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_name: errpipe-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_name: errpipe-darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libpng-dev libxext-dev libxinerama-dev libxrandr-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1 # FIXED: Turn CGO back on so robotgo can compile its C code
        shell: bash
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.binary_name }} main.go 

      - name: Compress with UPX
        uses: svenstaro/upx-action@v2
        with:
          files: ${{ matrix.binary_name }}
          args: -9
          strip: true
        continue-on-error: true

      - name: Prepare Artifacts Folder
        shell: bash
        run: |
          mkdir -p artifacts
          cp docs/install/install.ps1 ./artifacts/install.ps1 || true # Added || true just in case it doesn't exist on all builds
          cp docs/install/install.sh ./artifacts/install.sh
          mv ${{ matrix.binary_name }} ./artifacts/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: artifacts/*
  
  release:
      name: Create Release
      needs: build
      if: always()
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
  
        - name: Read version from file
          id: get_version
          shell: bash
          run: |
            VERSION=$(cat .github/version.txt | tr -d '[:space:]' | sed 's/^v//')
            echo "version=v${VERSION}" >> $GITHUB_OUTPUT
  
        - name: Download all artifacts
          uses: actions/download-artifact@v4
          with:
            path: fetched_artifacts
            merge-multiple: true
          continue-on-error: true
  
        - name: Create Release
          uses: softprops/action-gh-release@v2
          with:
            files: |
              fetched_artifacts/*
            generate_release_notes: true
            tag_name: ${{ steps.get_version.outputs.version }}
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}