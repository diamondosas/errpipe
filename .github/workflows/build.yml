name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: errpipe-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary_name: errpipe-linux-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: errpipe-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_name: errpipe-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_name: errpipe-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.binary_name }} main.go ai.go

      - name: Compress with UPX
        uses: svenstaro/upx-action@v2
        with:
          files: ${{ matrix.binary_name }}
          args: -9
          strip: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      (needs.build.result == 'success' || needs.build.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
